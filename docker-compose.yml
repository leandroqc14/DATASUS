services:
  datasus-helper:
    build: .
    container_name: datasus_helper_app
    ports:
      - "8501:8501"
    environment:
      - GEMINI_API_KEY
    volumes:
      - datasus_cache:/app/datasus_cache
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  datasus_cache:
